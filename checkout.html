<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | Jingucha®</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/styles.css">
<style>
  body { background-color: var(--bg); color: var(--text); padding-top: 100px; }
  .checkout-wrapper { max-width: 1000px; margin: 0 auto; padding: 4rem 5vw; display: flex; flex-wrap: wrap; gap: 4rem; }
  .form-container { flex: 1; min-width: 300px; background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 20px; padding: 2.5rem; box-shadow: var(--shadow-sm); }
  .summary-container { width: 350px; background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 20px; padding: 2.5rem; height: fit-content; position: sticky; top: 120px; box-shadow: var(--shadow-sm); }
  
  h2 { font-family: 'Playfair Display'; font-weight: 400; margin-bottom: 2rem; font-size: 2.2rem; }
  .form-group { margin-bottom: 1.5rem; }
  .form-group label { display: block; font-family: 'DM Sans'; font-size: 0.9rem; color: var(--text); opacity: 0.7; margin-bottom: 0.5rem; }
  .form-group input { width: 100%; background: transparent; border: 1px solid var(--glass-border); padding: 1rem; border-radius: 10px; color: var(--text); font-family: 'DM Sans'; outline: none; transition: border 0.3s; }
  .form-group input:focus { border-color: var(--accent); }
  
  .summary-item { display: flex; justify-content: space-between; margin-bottom: 1rem; font-family: 'DM Sans'; color: var(--text); opacity: 0.8; }
  .summary-total { display: flex; justify-content: space-between; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--glass-border); font-weight: 700; font-size: 1.3rem; color: var(--text); }
  
  .pay-btn { background: var(--accent); color: var(--btn-text-color); border: none; padding: 1.2rem; width: 100%; border-radius: 50px; font-size: 1.1rem; font-weight: 500; cursor: pointer; margin-top: 2rem; text-transform: uppercase; letter-spacing: 1.5px; transition: all 0.3s ease; }
  .pay-btn:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(212,175,55,0.2); }
</style>
</head>
<body>

<nav class="navbar scrolled">
  <a href="index.html" class="logo">
    <img src="images/logo.png" alt="Jingucha Logo" style="height: 40px;">
  </a>
  <div class="nav-right">
    <a href="index.html#philosophy" style="margin-right: 1.5rem; font-family: 'DM Sans';">Philosophy</a>
    <button class="theme-toggle" id="themeToggle"><span id="themeIcon"><i class="fa-solid fa-seedling"></i></span></button>
    <a href="product.html" class="cta-btn" style="border: 1px solid var(--accent); background: transparent; padding: .5rem 1.2rem; border-radius: 25px; font-weight: 500; color: var(--accent);">Return to Shop</a>
  </div>
</nav>

<main>
  <div class="checkout-wrapper">
    <div class="form-container">
      <h2>Shipping Details</h2>
      <form>
        <div style="display: flex; gap: 1rem;">
          <div class="form-group" style="flex: 1;">
            <label>First Name</label>
            <input type="text" placeholder="Jane">
          </div>
          <div class="form-group" style="flex: 1;">
            <label>Last Name</label>
            <input type="text" placeholder="Doe">
          </div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="jane@example.com">
        </div>
        <div class="form-group">
          <label>Address</label>
          <input type="text" placeholder="123 Wellness Ave">
        </div>
        
        <h2 style="margin-top: 3rem;">Payment</h2>
        <div class="form-group">
          <label>Card Number</label>
          <input type="text" placeholder="0000 0000 0000 0000">
        </div>
        <div style="display: flex; gap: 1rem;">
          <div class="form-group" style="flex: 1;">
            <label>Expiry (MM/YY)</label>
            <input type="text" placeholder="12/25">
          </div>
          <div class="form-group" style="flex: 1;">
            <label>CVC</label>
            <input type="text" placeholder="123">
          </div>
        </div>
      </form>
    </div>
    
    <div class="summary-container">
      <h2 style="font-size: 1.8rem; margin-bottom: 1.5rem;">Your Ritual</h2>
      <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
        <img src="images/product-front.png" style="width: 60px; height: 60px; border-radius: 10px; object-fit: cover;">
        <div>
          <h4 style="font-family: 'Playfair Display'; font-weight: 400; font-size: 1.2rem;">Plantivinia</h4>
          <p style="color: rgba(255,255,255,0.6); font-size: 0.9rem;">Qty: 1</p>
        </div>
      </div>
      
      <div class="summary-item">
        <span>Subtotal</span>
        <span>₹200</span>
      </div>
      <div class="summary-item">
        <span>Shipping</span>
        <span>Complimentary</span>
      </div>
      
      <div class="summary-total">
        <span>Total</span>
        <span>₹200</span>
      </div>
      
      <button class="pay-btn" onclick="alert('Thank you for your order. Your journey begins soon.')">Complete Order</button>
    </div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>
<script src="js/main.js"></script>
<script>
  gsap.from(".form-container", { opacity: 0, y: 30, duration: 1, ease: "power2.out" });
  gsap.from(".summary-container", { opacity: 0, x: 30, duration: 1, delay: 0.2, ease: "power2.out" });
</script>
</body>
</html>
